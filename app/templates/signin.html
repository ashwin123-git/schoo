<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business App - Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-lg shadow-xl p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800">Business App</h1>
                <p class="text-gray-600 mt-2">Sign in to your account</p>
            </div>

            <form id="signinForm" class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                    <input type="email" id="email" name="email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="you@example.com">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <input type="password" id="password" name="password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="••••••••">
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200">Sign In</button>
            </form>

            <div id="message" class="mt-4 text-center"></div>

            <div class="mt-6 text-center">
                <p class="text-gray-600">Don't have an account? <a href="/api/auth/signup" class="text-blue-600 hover:text-blue-800 font-semibold">Sign up here</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('signinForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');

            console.log('Signing in with email:', email);

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                console.log('Login response:', data);
                console.log('Response status:', response.status);

                if (response.ok) {
                    console.log('Token received:', data.access_token ? `Yes (${data.access_token.substring(0, 20)}...)` : 'No');
                    localStorage.setItem('access_token', data.access_token);
                    console.log('Token stored in localStorage');
                    messageDiv.innerHTML = '<p class="text-green-600 font-semibold">Login successful! Redirecting...</p>';
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1000);
                } else {
                    messageDiv.innerHTML = `<p class="text-red-600 font-semibold">${data.error}</p>`;
                }
            } catch (error) {
                console.error('Login error:', error);
                messageDiv.innerHTML = `<p class="text-red-600 font-semibold">An error occurred. Please try again.</p>`;
            }
        });
    </script>
</body>
</html>
